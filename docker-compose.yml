services:
  dev-container:
    build: .
    container_name: copilot-dev-container

    privileged: true

    volumes:
      # Persist entire agent home directory (includes config, workspace, everything except
      # ~/.vscode-server/extensions which is managed via the bind-mount below)
      - agent-home:/home/agent

      # Persist Docker-in-Docker state (images/containers started by Aspire)
      - docker-data:/var/lib/docker

      # Mount MCP configuration (managed externally)
      - ./copilot:/home/agent/.copilot

      # Mount VS Code remote machine settings
      - ./vscode-settings.json:/home/agent/.vscode-server/data/Machine/settings.json

      # Mount VS Code extensions directory so installs via the UI are git-tracked.
      # Install extensions through VS Code, then commit ./vscode-server/extensions/
      # to share the same extension set with other developers.
      - ./vscode-server/extensions:/home/agent/.vscode-server/extensions

      # Mount cli-mcp-mapper commands
      - ./commands.json:/home/agent/.config/cli-mcp-mapper/commands.json

    environment:
      - GIT_USERNAME=${GIT_USERNAME}
      - GIT_EMAIL=${GIT_EMAIL}
      - ZSH_THEME=jonathan

    ports:
      - "2222:2222"
      - "17275:17275"
      - "65432:65432"

    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/2222"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  agent-home:
  docker-data:
