services:
  dev-container:
    build: .
    container_name: copilot-dev-container

    privileged: true

    volumes:
      # Persist entire agent home directory (includes config, workspace, etc.)
      - agent-home:/home/agent

      # Persist Docker-in-Docker state (images/containers started by Aspire)
      - docker-data:/var/lib/docker

      # Mount VS Code server directory so settings, MCP config, and extensions installed
      # via the UI are git-tracked and persist across container rebuilds.
      - ./vscode-server:/home/agent/.vscode-server

      # Mount cli-mcp-mapper commands
      - ./commands.json:/home/agent/.config/cli-mcp-mapper/commands.json
      
      # Export SSH keys to host filesystem
      - ./.ssh-keys:/ssh-keys

    environment:
      # Per-developer Git configuration
      - GIT_USERNAME=${GIT_USERNAME}
      - GIT_EMAIL=${GIT_EMAIL}
      
      # Repository checkout configuration
      - REPO_URL=git@ssh.dev.azure.com:v3/TDRRecoveryTrac/RecoveryTrac/Aspire
      - REPO_FOLDER=RecoveryTrac
      
      # Shell theme preference
      - ZSH_THEME=jonathan
      
      # Aspire Dashboard binding (0.0.0.0 allows external access)
      - ASPNETCORE_URLS=https://0.0.0.0:17143

    ports:
      # SSH (VS Code Remote-SSH)
      - "2222:2222"
      # Aspire Dashboard
      - "17143:17143"
      # WebApi
      - "7107:7107"
      # GitHub Copilot authentication callback
      - "17275:17275"
      # cli-mcp-mapper MCP server
      - "65432:65432"

    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/2222"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  agent-home:
  docker-data:
